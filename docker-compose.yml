services:
  # Challenge-App (Classroom-Challenge)
  challenge:
    build: .
    ports:
      - "8510:8510"
    volumes:
      - ./data:/app/data
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - CHALLENGE_ADMIN_SECRET=hsb2026
      - CHALLENGE_APP_URL=http://localhost:8510
    command: >
      streamlit run app/challenge_app.py
      --server.address 0.0.0.0
      --server.port 8510
      --browser.gatherUsageStats false
